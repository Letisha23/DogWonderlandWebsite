    <script>
        // sign up a new customer and generate a random customer ID
        function signUp() {
            var customerIDNum = Math.floor(Math.random() * 1000000);
            var randomCustomerID = 'CUST' + customerIDNum;
            document.getElementById('customerID').value = randomCustomerID;
            localStorage.setItem('customerID', randomCustomerID);
            window.dataLayer.push({
                'event': 'IdentifyInvoked',
                'customerID': randomCustomerID
            });
        }

        // SKU-to-category mapping
        var skuCategoryMap = {
            'DT-001': 'Dog Toys',
            'DF-002': 'Dog Food',
            'DA-003': 'Dog Accessories'
        };

        function mapCategoryFromSKU(sku) {
            return skuCategoryMap[sku.trim()] || '';
        }

        // Auto populate form fields with dummy data for testing
        function autoPopulateForm() {
            var orderIDNum = Math.floor(Math.random() * 100000);
            var randomOrderID = 'ORD' + orderIDNum;
            var subtotals = ['49.99', '79.99', '129.99'];
            var randomSubtotal = subtotals[Math.floor(Math.random() * subtotals.length)];
            var skus = Object.keys(skuCategoryMap);
            var randomSKU = skus[Math.floor(Math.random() * skus.length)];
            var randomCategory = mapCategoryFromSKU(randomSKU);
            var randomQuantity = Math.floor(Math.random() * 5) + 1;
            var promoCodes = ['DOGLOVER20', 'PUPPYLOVE10', 'FURRYFRIEND15'];
            var randomPromo = promoCodes[Math.floor(Math.random() * promoCodes.length)];
            
            document.getElementById('orderID').value = randomOrderID;
            document.getElementById('subtotal').value = randomSubtotal;
            document.getElementById('category').value = randomCategory;
            document.getElementById('SKU').value = randomSKU;
            document.getElementById('quantity').value = randomQuantity;
            document.getElementById('promoCode').value = randomPromo;

            localStorage.setItem('custName', randomCustName);
            localStorage.setItem('orderID', randomOrderID);
            localStorage.setItem('subtotal', randomSubtotal);
            localStorage.setItem('category', randomCategory);
            localStorage.setItem('SKU', randomSKU);
            localStorage.setItem('quantity', randomQuantity);
            localStorage.setItem('promoCode', randomPromo);

        // Push all the data to the Google Tag Manager dataLayer
        window.dataLayer.push({
            'event': 'conversionDataReady', // This is a custom event name for triggering tags
            'custName': randomCustName,
            'orderID': randomOrderID,
            'subtotal': randomSubtotal,
            'category': randomCategory,
            'SKU': randomSKU,
            'quantity': randomQuantity,
            'promoCode': randomPromo
        });
        }

    <header>
        <h1>🐕 Dog Wonderland 🌈</h1>
        <p>Simulated Dog Website Landing Page</p>   
    </header>
             
    <div class="banner">
        <h2>Sign Up now</h2>
        <p>Click here to sign up as a member of Dog Wonderland. This will automatically generate a customer ID.</p>
        <button class="button" onclick="signUp()">Sign Up</button>
    </div>

    <main>
        <section id="welcome">
            <h2>Welcome to Dog Wonderland</h2>
            <p>Discover products which you can buy for your furry friend!</p>
        </section>
        
        <section id="form">
            <form>
                <label for="orderID">Order ID:</label>
                <input type="text" id="orderID" name="orderID"><br>

                <label for="subtotal">Subtotal:</label>
                <input type="text" id="subtotal" name="subtotal"><br>

                <label for="category">Category:</label>
                <input type="text" id="category" name="category"><br>

                <label for="SKU">SKU:</label>
                <input type="text" id="SKU" name="SKU" oninput="syncCategoryFromSKU()"><br>

                <label for="quantity">Quantity:</label>
                <input type="text" id="quantity" name="quantity"><br>

                <label for="promoCode">Promo Code:</label>
                <input type="text" id="promoCode" name="promoCode"><br>

                <button type="button" class="button" style="font-size: 18px;" onclick="autoPopulateForm()">Auto Populate Form</button>
                <a href="confirmation.html" class="button">Submit</a>
            </form>
        </section>

    </main>
